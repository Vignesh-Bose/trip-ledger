<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Trip Ledger</title>
  <!-- Tailwind CSS CDN for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom background gradient to make the translucent effect pop */
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
    }
    /* The custom translucent glassmorphic styles */
    .glass-card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .glass-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      outline: none;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased text-white">

  <!-- Main Glass Ledger Container -->
  <div class="glass-card w-full max-w-md rounded-2xl p-6 sm:p-8">
    
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold tracking-wide">🌍 Trip Ledger</h1>
      <span class="bg-emerald-500/20 text-emerald-400 text-xs px-2.5 py-1 rounded-full font-medium border border-emerald-500/30 flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> Real-time
      </span>
    </div>

    <!-- Total Display -->
    <div class="bg-white/5 border border-white/5 rounded-xl p-4 mb-6 text-center">
      <p class="text-sm text-gray-400 uppercase tracking-wider font-semibold">Total Pool Expense</p>
      <p id="totalAmount" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-indigo-400 mt-1">$0.00</p>
    </div>

    <!-- Input Form -->
    <form id="expenseForm" class="space-y-4 mb-6">
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Expense Item</label>
        <input 
          type="text" 
          id="description" 
          placeholder="e.g., Gas, Beach Dinner, AirBnB" 
          required 
          class="glass-input w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-sm"
        >
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Amount ($)</label>
        <input 
          type="number" 
          step="0.01" 
          id="amount" 
          placeholder="0.00" 
          required 
          class="glass-input w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-sm"
        >
      </div>
      <button 
        type="submit" 
        class="w-full bg-gradient-to-r from-teal-500 to-indigo-500 hover:from-teal-400 hover:to-indigo-400 active:scale-[0.98] transition-all text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-500/20 text-sm"
      >
        Add to Ledger
      </button>
    </form>

    <!-- Ledger List -->
    <div class="border-t border-white/10 pt-4">
      <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Live Log</h3>
      <div id="loading" class="text-center text-sm text-gray-500 py-4">Connecting to live vault...</div>
      <ul id="expenseList" class="space-y-2 max-h-60 overflow-y-auto pr-1">
        <!-- Live elements injected here -->
      </ul>
    </div>
  </div>

  <!-- Firebase JavaScript Module Configuration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // FIXME: Replace with your actual Firebase config details from your Firebase Console
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize App & Database
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const expensesRef = ref(db, "trip-ledger/expenses");

    // DOM Elements
    const expenseForm = document.getElementById("expenseForm");
    const descriptionInput = document.getElementById("description");
    const amountInput = document.getElementById("amount");
    const expenseList = document.getElementById("expenseList");
    const totalAmountDisplay = document.getElementById("totalAmount");
    const loadingEl = document.getElementById("loading");

    // 1. Submit Event: Push to Firebase Cloud
    expenseForm.addEventListener("submit", (e) => {
      e.preventDefault();
      
      const expenseData = {
        description: descriptionInput.value.trim(),
        amount: parseFloat(amountInput.value),
        timestamp: Date.now()
      };

      push(expensesRef, expenseData)
        .then(() => {
          expenseForm.reset();
        })
        .catch((error) => alert("Error saving data: " + error.message));
    });

    // 2. Real-time Event: Listen to Database changes globally
    onValue(expensesRef, (snapshot) => {
      loadingEl.classList.add("hidden");
      expenseList.innerHTML = "";
      let total = 0;

      const data = snapshot.val();
      if (data) {
        // Sort entries by time (newest at the top)
        const entries = Object.entries(data).sort((a, b) => b[1].timestamp - a[1].timestamp);

        entries.forEach(([key, value]) => {
          total += value.amount;

          // Build a translucent list item line
          const li = document.createElement("li");
          li.className = "flex justify-between items-center bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-sm";
          li.innerHTML = `
            <div class="flex flex-col">
              <span class="font-medium text-gray-200">${value.description}</span>
              <span class="text-[10px] text-gray-500">${new Date(value.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            </div>
            <span class="font-bold text-teal-400">$${value.amount.toFixed(2)}</span>
          `;
          expenseList.appendChild(li);
        });
      } else {
        expenseList.innerHTML = `<div class="text-center text-sm text-gray-500 py-4">No transactions found. Start spending!</div>`;
      }

      totalAmountDisplay.textContent = `$${total.toFixed(2)}`;
    });
  </script>
</body>
</html>
